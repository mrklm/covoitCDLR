<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Carte de covoiturage des salariés du festival vers Chalon-sur-Saône."
    />
    <title>covoitCDLR</title>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Festival à Chalon-sur-Saône</p>
        <h1>covoitCDLR</h1>
      </div>
      <p class="header-note">Carte de démonstration pour organiser les trajets.</p>
    </header>

    <main class="app-layout">
      <section class="map-panel" aria-label="Carte des participants">
        <div class="map-toolbar" aria-label="Choix du trajet affiché">
          <label for="journey-mode">Carte affichée</label>
          <select id="journey-mode">
            <option value="outbound">Allers</option>
            <option value="return">Retours</option>
          </select>
        </div>
        <div id="map"></div>
      </section>

      <aside class="info-panel" aria-label="Informations participants">
        <h2>Participants</h2>
        <p>
          Cliquez sur un nom pour renseigner les dates et les villes-étapes du
          trajet sélectionné.
        </p>
        <ul id="participant-list" class="participant-list"></ul>
      </aside>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
